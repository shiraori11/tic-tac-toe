<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <script src="./script.js" defer></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- <div class="winner-container"> -->
  <!--   <p>Hello There</p> -->
  <!-- </div> -->
  <div class="main-menu">
    <div class="player-name-input">
      <label for="player1-name">Player 1: </label>
      <input type="text" id="player1-name" placeholder="Player 1">
      <label for="player2-name">Player 2:</label>
      <input type="text" id="player2-name" placeholder="Player 2">
    </div>
    <button class="start-button">Tic Tac Go</button>
  </div>
  
  <div class="main-game">
    <div class="display-container">
      <p class="player-one-para">Player 1 Name</p>
      <div class="marker-indicator">
        <p>X</p>
      </div>  
      <p class="player-two-para">Player 2 Name</p>
    </div>
    <div class="game-container"></div>  
  </div>

  <div class="main-result">
    <div class="game-result">
      <p class="game-result-para">Player Name Wins!</p>
    </div>
    <div class="game-score">
      <div class="player-score">
        <p class="player-score-name" id="player-one-result">Player 1 Name</p>
        <p class="player-score-score" id="player-one-score">0</p>
      </div>
      <div class="player-score">
        <p class="player-score-name" id="player-two-result">Player 2 Name</p>
        <p class="player-score-score" id="player-two-score">1</p>
      </div>
    </div>
    <div class="main-result-button">
      <button class="result-button">Play Again</button>
    </div>
  </div>
  
</body>
</html>
